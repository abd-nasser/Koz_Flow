# docker-compose.yml (simplifié pour SQLite)
version: '3.8'

services:
  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles/
      - media_volume:/app/media/
      - db_volume:/app/db/           # ← pour SQLite
    env_file:
      - .env.prod
    restart: always
    networks:
      - koz_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles/
      - media_volume:/app/media/
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: always
    networks:
      - koz_network

volumes:
  static_volume:
  media_volume:
  db_volume:          # ← pour SQLite

networks:
  koz_network:
    driver: bridge