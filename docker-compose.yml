services:
  postgres:
    image: postgres:15
    container_name: koz-postgres
    environment:
      POSTGRES_USER: koz_user
      POSTGRES_PASSWORD: koz_password
      POSTGRES_DB: koz_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - koz_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koz_user -d koz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: koz-flow-web
    volumes:
      - static_volume:/app/staticfiles/
      - media_volume:/app/media/
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - koz_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: koz-flow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles/
      - media_volume:/app/media/
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
    networks:
      - koz_network
    restart: always

volumes:
  static_volume:
  media_volume:
  db_volume:
  postgres_data:

networks:
  koz_network:
    driver: bridge