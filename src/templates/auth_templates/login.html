<!-- templates/auth_app/login.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - KOZ Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}


    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">K</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">KOZ Services</h1>
            <p class="text-gray-500 mt-1">Concessionnaire automobile</p>
        </div>
        
        <!-- Formulaire -->
        <form id="loginForm" class="space-y-5">
            {% csrf_token %}
            <!-- Champ Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Adresse email
                </label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition"
                    placeholder="exemple@kozservices.com">
            </div>
            
            <!-- Champ Mot de passe -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Mot de passe
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition"
                    placeholder="••••••••">
            </div>
            
            <!-- Message d'erreur -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg text-sm">
                Email ou mot de passe incorrect
            </div>
            
            <!-- Bouton de connexion -->
            <button type="submit" id="loginBtn"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <span id="btnText">Se connecter</span>
                <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
        
        <!-- Lien mot de passe oublié -->
        <div class="text-center mt-6">
            <a href="#" class="text-sm text-red-600 hover:text-red-700">Mot de passe oublié ?</a>
        </div>
        
        <!-- Séparateur -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">Nouveau client ?</span>
            </div>
        </div>
        
        <!-- Lien inscription -->
        <a href="/register/" 
           class="block w-full text-center border border-gray-300 hover:border-red-500 text-gray-700 hover:text-red-600 font-semibold py-2 px-4 rounded-lg transition duration-200">
            Créer un compte
        </a>
    </div>
    
    <script>
        // Récupération des éléments du DOM
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        // recuperer le token CSRF de Django
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        
        // Fonction pour afficher/cacher le chargement
        function setLoading(loading) {
            if (loading) {
                btnText.classList.add('hidden');
                btnSpinner.classList.remove('hidden');
                loginBtn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                loginBtn.disabled = false;
            }
        }
        
        // Fonction pour afficher une erreur
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 3000);
        }
        
        // Gestion de la soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();  // Empêche le rechargement de la page
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            setLoading(true);
            
            try {
                // Appel à l'API de connexion
                const response = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                        // Si CSRF est utilisé
            
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                    })
                });
                
                const data = await response.json();
                
                if (response.ok){
                    // Connexion réussie : on stocke les tokens
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    console.log('Connexion réussie:', data.user);
                    // Redirection vers le dashboard correspondant
                    window.location.href = data.redirect_url;
                } else {
                    // Connexion échouée
                    console.log('Erreur:', data.error);;
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Erreur de connexion au serveur');
            } finally {
                setLoading(false);
            }
        });
        
        // Vérifier si l'utilisateur est déjà connecté
        //const token = localStorage.getItem('access_token');
        //if (token) {
        //    // Si déjà connecté, rediriger vers le dashboard approprié
        //    fetch('/api/auth/me/', {
        //        headers: {
        //            'Authorization': `Bearer ${token}`
        //        }
           // })
           // .then(res => res.json())
          //  .then(user => {
         //       if (user.role === 'directeur' || user.is_superuser) {
         //           window.location.href = 'directeur/dashboard/';
         //       } else if (user.role === 'commercial') {
          //          window.location.href = 'commercial/dashboard/';
         //       } else {
        //            window.location.href = 'client/dashboard/';
         //       }
         //   })
        //    .catch(() => {
                // Token invalide, on reste sur la page login
         //       localStorage.clear();
           // });
       // }
    </script>
</body>
</html>
