<!-- templates/auth_app/login.html -->
{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - KOZ Services</title>
    <script src="{% static 'js/htmx.min.js' %}"></script>
    {% tailwind_css %}  <!-- Inclut le CSS de Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<button class="btn" onclick="document.getElementById('login_modal').showModal()"> Se connecter à votre espace</button>
{% include 'modals/auth/login_modal.html' %}
    
    <script>
        // Récupération des éléments du DOM
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        // recuperer le token CSRF de Django
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        
        // Fonction pour afficher/cacher le chargement
        function setLoading(loading) {
            if (loading) {
                btnText.classList.add('hidden');
                btnSpinner.classList.remove('hidden');
                loginBtn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                loginBtn.disabled = false;
            }
        }
        
        // Fonction pour afficher une erreur
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 3000);
        }
        
        // Gestion de la soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();  // Empêche le rechargement de la page
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            setLoading(true);
            
            try {
                // Appel à l'API de connexion
                const response = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                        // Si CSRF est utilisé
            
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                    })
                });
                
                const data = await response.json();
                
                if (response.ok){
                    // Connexion réussie : on stocke les tokens
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    console.log('Connexion réussie:', data.user);
                    // Redirection vers le dashboard correspondant
                    window.location.href = data.redirect_url;
                } else {
                    // Connexion échouée
                    console.log('Erreur:', data.error);;
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Erreur de connexion au serveur');
            } finally {
                setLoading(false);
            }
        });
        
        // Vérifier si l'utilisateur est déjà connecté
        //const token = localStorage.getItem('access_token');
        //if (token) {
        //    // Si déjà connecté, rediriger vers le dashboard approprié
        //    fetch('/api/auth/me/', {
        //        headers: {
        //            'Authorization': `Bearer ${token}`
        //        }
           // })
           // .then(res => res.json())
          //  .then(user => {
         //       if (user.role === 'directeur' || user.is_superuser) {
         //           window.location.href = 'directeur/dashboard/';
         //       } else if (user.role === 'commercial') {
          //          window.location.href = 'commercial/dashboard/';
         //       } else {
        //            window.location.href = 'client/dashboard/';
         //       }
         //   })
        //    .catch(() => {
                // Token invalide, on reste sur la page login
         //       localStorage.clear();
           // });
       // }
    </script>
</body>
</html>
