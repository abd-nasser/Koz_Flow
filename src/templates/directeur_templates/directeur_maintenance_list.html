{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/commercial/maintenance_list_style.css' %}">
    {%tailwind_css%}
    <title>Liste des maintenance</title>
</head>
<body>
    
<nav>

</nav>
<header>
    <div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">🔧 Suivi des maintenances</h1>
        <button class="btn btn-primary" onclick="document.getElementById('maintenanceModal').showModal()">
          🔧 Planifier une maintenance
        </button>
    </div>
    <!-- Include modal for creating maintenance -->
    {% include 'modals/maintenance/create_maintenance.html' %}
    </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    
    <!-- Section des filtres -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-8">
        
        <!-- Titre de la section -->
        <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
            🔍 Filtrer les maintenances
        </h2>

        <!-- Grille des filtres -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
            
            <!-- Barre de recherche -->
            <div class="form-control w-full">
                <label class="label pb-1">
                    <span class="label-text text-gray-600 text-sm">🔎 Recherche</span>
                </label>
                <input 
                    type="text" 
                    name="q"
                    class="input input-bordered w-full h-10" 
                    placeholder="Client, véhicule..."
                    hx-get="{% url 'commercial_app:maintenance-list' %}"
                    hx-include=".filters-container select, .filters-container input"
                    hx-swap="innerHTML" 
                    hx-target="#Tableau_des_maintenances" 
                    hx-trigger="keyup changed delay:500ms">
            </div>

            <!-- Filtre type de maintenance -->
            <div class="form-control w-full">
                <label class="label pb-1">
                    <span class="label-text text-gray-600 text-sm">🛠️ Type</span>
                </label>
                <select 
                    class="select select-bordered w-full h-10" 
                    name="type_maintenance"
                    hx-get="{% url 'commercial_app:maintenance-list' %}"
                    hx-include=".filters-container select, .filters-container input"
                    hx-swap="innerHTML" 
                    hx-target="#Tableau_des_maintenances" 
                    hx-trigger="change">
                    <option value="">Tous types</option>
                    {% for value, label in type_maintenance_choices %}
                        <option value="{{ value }}" {% if request.GET.type_maintenance == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Filtre priorité -->
            <div class="form-control w-full">
                <label class="label pb-1">
                    <span class="label-text text-gray-600 text-sm">⚡ Priorité</span>
                </label>
                <select 
                    class="select select-bordered w-full h-10" 
                    name="priorite"
                    hx-get="{% url 'commercial_app:maintenance-list' %}"
                    hx-include=".filters-container select, .filters-container input"
                    hx-swap="innerHTML" 
                    hx-target="#Tableau_des_maintenances" 
                    hx-trigger="change">
                    <option value="">Toutes priorités</option>
                    {% for value, label in priorite_choices %}
                        <option value="{{ value }}" {% if request.GET.priorite == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Filtre origine -->
            <div class="form-control w-full">
                <label class="label pb-1">
                    <span class="label-text text-gray-600 text-sm">🏷️ Origine</span>
                </label>
                <select 
                    class="select select-bordered w-full h-10" 
                    name="origine"
                    hx-get="{% url 'commercial_app:maintenance-list' %}"
                    hx-include=".filters-container select, .filters-container input"
                    hx-swap="innerHTML" 
                    hx-target="#Tableau_des_maintenances" 
                    hx-trigger="change">
                    <option value="">Toutes origines</option>
                    {% for value, label in origine_choices %}
                        <option value="{{ value }}" {% if request.GET.origine == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Filtre statut -->
            <div class="form-control w-full">
                <label class="label pb-1">
                    <span class="label-text text-gray-600 text-sm">📌 Statut</span>
                </label>
                <select 
                    class="select select-bordered w-full h-10" 
                    name="statut"
                    hx-get="{% url 'commercial_app:maintenance-list' %}"
                    hx-include=".filters-container select, .filters-container input"
                    hx-swap="innerHTML" 
                    hx-target="#Tableau_des_maintenances" 
                    hx-trigger="change">
                    <option value="">Tous statuts</option>
                    {% for value, label in statut_choices %}
                        <option value="{{ value }}" {% if request.GET.statut == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <!-- Ligne de réinitialisation (optionnelle) -->
        <div class="mt-4 pt-3 border-t border-gray-100 flex justify-end">
            <a href="{% url 'commercial_app:maintenance-list' %}" 
               class="text-sm text-gray-500 hover:text-gray-700 transition flex items-center gap-1">
                🔄 Réinitialiser les filtres
            </a>
        </div>
    </div>

    <!-- Tableau des maintenances -->
    <div id="Tableau_des_maintenances">
        {% include 'partials/maintenance/partials_maintenance_list.html' %}
    </div>

</main>


<footer>

</footer>




</body>
</html>
