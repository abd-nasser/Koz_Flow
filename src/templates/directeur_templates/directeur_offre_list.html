{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liste des offres</title>
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/commercial/commercial_offre_list_style.css' %}">
    {% tailwind_css %}
</head>
<body>
        <nav>

        </nav>
        <header>
            
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
                    
        </header>

        <main>
            <div>
                <button class="btn btn-primary" onclick="document.getElementById('offreModal').showModal()">creer une offre</button>
                {% include 'modals/leads/creer_offre.html' %}
            </div>

            <div class="filter-container">

                    <!--filter by search-->
                <div class="form-control w-full">
                    <label class="label pb-1">
                        <span class="label-text text-gray-600 text-sm">🔎 Recherche</span>
                    </label>
                    <input 
                    name="q"

                    class="input input-bordered w-full h-10"
                    type="text"
                    placeholder="Rechercher par client ou véhicule..."
                    hx-get="{% url 'commercial_app:offre-list' %}"
                    hx-target="#offre-list"
                    hx-trigger="keyup changed delay:500ms"
                    hx-swap="innerHTML"
                    hx-include=".filter-container input, .filter-container select"
                    >
                </div>
                
                    <!--filter by statut-->
                    
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text text-gray-600 text-sm">📊 Filtrer par statut</span>
                    </label>
                    <select 
                    class="select select-bordered w-full h-10"
                    name="statut"
                    hx-get="{% url 'commercial_app:offre-list' %}"
                    hx-target="#offre-list"
                    hx-trigger="change"
                    hx-swap="innerHTML"
                    hx-include=".filter-container input, .filter-container select"
                    >
                        <option value="">Tous les statuts</option>
                        {% for value, label in STATUTS_OFFRE %}
                            <option value="{{ value }}" {% if request.GET.statut == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                            
                    </select>

            </div>
            <div id="offre-list">
            {% include 'partials/offre/partials_offre_list.html' %}
            </div>
                
        </main>

        <footer>

        </footer>
</body>
</html>
