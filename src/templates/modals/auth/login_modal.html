<dialog id="login_modal" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
     <!-- Formulaire -->
        <form id="loginForm" class="space-y-5">
            {% csrf_token %}
            <!-- Champ Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Adresse email
                </label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="exemple@kozservices.com">
            </div>
            
            <!-- Champ Mot de passe -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Mot de passe
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="••••••••">
            </div>
            
            <!-- Message d'erreur -->
            <div id="errorMessage" class="hidden bg-blue-50 border border-blue-200 text-blue-500-700 px-4 py-2 rounded-lg text-sm">
                Email ou mot de passe incorrect
            </div>
            
            <!-- Bouton de connexion -->
            <button type="submit" id="loginBtn"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                <span id="btnText">Se connecter</span>
                <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
        <!-- Lien mot de passe oublié -->
        <div class="text-center mt-6">
            <a href="#" class="text-sm text-blue-600 hover:text-blue-700">Mot de passe oublié ?</a>
        </div>
        
        <!-- Séparateur -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">Nouveau client ?</span>
            </div>
        </div>
        
        <!-- Lien inscription -->
        <a href="/register/" 
           class="block w-full text-center border border-gray-300 hover:border-blue-500 text-gray-700 hover:text-blue-600 font-semibold py-2 px-4 rounded-lg transition duration-200">
            Créer un compte
        </a>
    </div>
       
        </form>
  </div>
</dialog>
