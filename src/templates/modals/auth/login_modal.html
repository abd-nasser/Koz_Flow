<!-- templates/modals/auth/login_modal.html -->
<dialog id="login_modal" class="modal">
    <div class="modal-box rounded-2xl shadow-2xl transform transition-all duration-300 scale-95">
        <div class="flex justify-between items-center border-b pb-3 mb-4">
            <h3 class="text-xl font-bold text-gray-800">🔐 Connexion</h3>
            <button type="button" class="text-gray-400 hover:text-gray-600 text-2xl leading-none" 
                    onclick="document.getElementById('login_modal').close()">&times;</button>
        </div>
        
        <form id="loginForm" method="post" action="/api/auth/login/">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="label text-gray-700 font-medium">Email</label>
                    <input type="email" id="email" name="email" 
                           class="input input-bordered w-full focus:ring-2 focus:ring-blue-500 transition" 
                           placeholder="exemple@kozservices.com" required>
                </div>
                
                <div>
                    <label class="label text-gray-700 font-medium">Mot de passe</label>
                    <input type="password" id="password" name="password" 
                           class="input input-bordered w-full focus:ring-2 focus:ring-blue-500 transition" 
                           placeholder="••••••••" required>
                </div>
                
                <div id="errorMessage" class="alert alert-error text-sm hidden"></div>
                
                <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                    <span id="btnText">Se connecter</span>
                    <span id="btnSpinner" class="loading loading-spinner loading-sm hidden"></span>
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4">
            <a href="#" class="text-sm text-blue-600 hover:underline">Mot de passe oublié ?</a>
        </div>
        
        <div class="modal-action mt-4">
            <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('login_modal').close()">
                Annuler
            </button>
        </div>
    </div>
</dialog>


     <script>
        // Gestion de la soumission du formulaire
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]')?.value;

        function setLoading(loading) {
            if (!loginBtn) return;
            if (loading) {
                btnText?.classList.add('hidden');
                btnSpinner?.classList.remove('hidden');
                loginBtn.disabled = true;
            } else {
                btnText?.classList.remove('hidden');
                btnSpinner?.classList.add('hidden');
                loginBtn.disabled = false;
            }
        }

        function showError(message) {
            if (!errorDiv) return;
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 4000);
        }

        if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
           
            
            const email = emailInput?.value.trim();
            const password = passwordInput?.value;
            
            
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            setLoading(true);
            
            try {
           
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken || ''
                },
                body: JSON.stringify({ email, password })
            });
            
           
            
            const data = await response.json();
        
            
            if (response.ok) {
                console.log('✅ Login réussi !');
                
                localStorage.setItem('access', data.access);
                localStorage.setItem('refresh', data.refresh);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                
                window.location.href = data.redirect_url;
            } else {
                console.log('❌ Erreur login:', data.error);
                showError(data.error || 'Email ou mot de passe incorrect');
            }
        } catch (error) {
            console.error('❌ Erreur réseau:', error);
            showError('Erreur de connexion au serveur');
        } finally {
            setLoading(false);
        }
    });
}
</script>
