<dialog id="gestion_doc_modal" class="modal">
    <div class="modal-box w-full max-w-md p-0 overflow-hidden rounded-2xl bg-gradient-to-br from-white to-gray-50 shadow-2xl">
        
        <!-- Header avec dégradé -->
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 px-6 py-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold text-white">
                    <i class="fas fa-folder-open mr-2"></i>Gestion du dossier
                </h3>
                <button type="button" class="text-white/80 hover:text-white text-2xl leading-none transition" 
                        onclick="document.getElementById('gestion_doc_modal').close()">&times;</button>
            </div>
            <p class="text-blue-100 text-sm mt-1">Actions disponibles pour ce dossier documentaire</p>
        </div>

        <!-- Corps du modal -->
        <div class="p-6 space-y-4">
            
            <!-- Action : Vérifier -->
            <a href="{% url 'leads_app:verifier-document' document.pk %}" 
               class="flex items-center gap-4 p-4 rounded-xl bg-blue-50 border border-blue-200 hover:bg-blue-100 transition group">
                <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center group-hover:bg-blue-200 transition">
                    <i class="fas fa-search text-blue-700 text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-gray-800">Vérifier le dossier</p>
                    <p class="text-sm text-gray-500">Examiner les documents fournis</p>
                </div>
                <i class="fas fa-chevron-right text-gray-400 group-hover:text-blue-600 transition"></i>
            </a>

            <!-- Action : Modifier -->
            <a href="{% url 'leads_app:modifier-document' document.pk %}" 
               class="flex items-center gap-4 p-4 rounded-xl bg-yellow-50 border border-yellow-200 hover:bg-yellow-100 transition group">
                <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center group-hover:bg-yellow-200 transition">
                    <i class="fas fa-edit text-yellow-700 text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-gray-800">Modifier le dossier</p>
                    <p class="text-sm text-gray-500">Demander des modifications au client</p>
                </div>
                <i class="fas fa-chevron-right text-gray-400 group-hover:text-yellow-600 transition"></i>
            </a>

            <!-- Action : Valider -->
            <a href="{% url 'leads_app:valider-document' document.pk %}" 
               class="flex items-center gap-4 p-4 rounded-xl bg-green-50 border border-green-200 hover:bg-green-100 transition group">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center group-hover:bg-green-200 transition">
                    <i class="fas fa-check-circle text-green-700 text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-gray-800">Valider le dossier</p>
                    <p class="text-sm text-gray-500">Approuver définitivement le dossier</p>
                </div>
                <i class="fas fa-chevron-right text-gray-400 group-hover:text-green-600 transition"></i>
            </a>

            <!-- Action : Rejeter -->
            <a href="{% url 'leads_app:rejeter-document' document.pk %}" 
               class="flex items-center gap-4 p-4 rounded-xl bg-red-50 border border-red-200 hover:bg-red-100 transition group">
                <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center group-hover:bg-red-200 transition">
                    <i class="fas fa-times-circle text-red-700 text-xl"></i>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-gray-800">Rejeter le dossier</p>
                    <p class="text-sm text-gray-500">Refuser définitivement le dossier</p>
                </div>
                <i class="fas fa-chevron-right text-gray-400 group-hover:text-red-600 transition"></i>
            </a>

        </div>

        <!-- Footer avec bouton de fermeture -->
        <div class="bg-gray-50 px-6 py-4 flex justify-end">
            <button type="button" class="btn btn-ghost" onclick="document.getElementById('gestion_doc_modal').close()">
                <i class="fas fa-times mr-2"></i>Fermer
            </button>
        </div>

    </div>
</dialog>

<!-- Script pour réouvrir le modal en cas d'erreur -->
<script>
    {% if open_gestion_doc_modal %}
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('gestion_doc_modal').showModal();
    });
    {% endif %}
</script>

<style>
    /* Style supplémentaire pour les boutons inline si besoin */
    .btn-glow {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
    }
    .btn-glow:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        transform: translateY(-2px);
        box-shadow: 0 20px 35px -8px rgba(59, 130, 246, 0.7);
    }
</style>
