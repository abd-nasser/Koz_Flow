<!-- Modal -->
<dialog id="update_maintenanceModal" class="modal">
    <div class="modal-box w-11/12 max-w-2xl">
        <form method="post" action="{% url 'commercial_app:maintenance-update' maintenance.pk %}" enctype="multipart/form-data">
            {% csrf_token %}
            <h3 class="font-bold text-lg mb-4">🔧 Nouvelle maintenance</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in update_maintenance_form %}
                    <div class="form-group {% if field.name == 'notes_client' %}col-span-2{% endif %}">
                        {{ field.label_tag }}
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-red-500 text-sm mt-1">
                                {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            
            <div class="modal-action mt-6">
                <button type="submit" class="btn btn-primary">✅ Enregistrer</button>
                <button type="button" class="btn" onclick="document.getElementById('update_maintenanceModal').close()">Annuler</button>
            </div>
        </form>
    </div>
</dialog>

<script>
    // Reopen modal if form was invalid
    {% if open_update_maintenance_modal %}
        document.getElementById('update_maintenanceModal').showModal();
    {% endif %}
</script>
