<!-- modals/vehicule/upload_images_modal.html -->
<
<dialog id="upload_images_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box bg-white rounded-2xl shadow-2xl max-w-3xl p-0 overflow-hidden">
        
        <!-- En-tête -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-6 py-4 flex justify-between items-center">
            <div>
                <h3 class="text-xl font-bold text-white flex items-center gap-3">
                    <i class="fas fa-images"></i>
                    Ajouter des images
                </h3>
                <p class="text-blue-100 text-sm mt-1">
                    {{ vehicul.marque.nom }} {{ vehicul.modele }} - {{ vehicul.annee }}
                </p>
            </div>
            <button type="button" class="text-white/80 hover:text-white text-3xl leading-none transition" 
                    onclick="document.getElementById('upload_images_modal').close()">×</button>
        </div>
        
        <!-- Corps du formulaire -->
        <div class="p-6">
            <form method="post"
                  action="{% url 'vehicul_app:ajouter-image' vehicul.pk %}"
                  enctype="multipart/form-data"
                  hx-target="#image-grid"
                  hx-swap="outerHTML"
                  hx-on::after-request="closeModal();"
                  hx-indicator="#upload-indicator">
                
                {% csrf_token %}
                
                {{ vehicul_image_form.as_p }}
                
                <!-- Boutons d'action -->
                <div class="flex flex-wrap gap-3 mt-6 pt-4 border-t border-gray-100">
                    <button type="submit" 
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl transition flex items-center justify-center gap-2 font-medium shadow-md hover:shadow-lg">
                        <i class="fas fa-upload"></i> 
                        <span>Uploader</span>
                    </button>
                    
                    <button type="button" 
                            onclick="document.getElementById('upload_images_modal').close()" 
                            class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2.5 rounded-xl transition flex items-center justify-center gap-2 font-medium">
                        <i class="fas fa-times"></i> 
                        <span>Annuler</span>
                    </button>
                </div>
                
                <!-- Indicateur de chargement -->
                <div id="upload-indicator" class="mt-3 text-center text-gray-400 text-sm hidden">
                    <i class="fas fa-spinner fa-spin mr-2"></i> Upload en cours...
                </div>
            </form>
        </div>
    </div>
</dialog>

<script>
    function closeModal() {
        const modal = document.getElementById('upload_images_modal');
        if (modal) {
            modal.close();
        }
    }
<script/>
