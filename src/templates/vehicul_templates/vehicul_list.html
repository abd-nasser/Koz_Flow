{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% tailwind_css %}
    <link rel="stylesheet" href="{% static 'css/vehicul/vehicul_list_style.css' %}">
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <title>Liste des voitures</title>
</head>
<body>
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
    
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">🚗 Catalogue véhicules</h1>

    {% include 'partials/vehiculs/partials_vehicul_list.html' %}
        
    </div>
</div>


</body>
</html>
